apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: docops
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: worker-sa
      containers:
        - name: worker
          image: ghcr.io/example/docops-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: health
          envFrom:
            - configMapRef:
                name: docops-worker-config
            - secretRef:
                name: docops-worker-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 20
            periodSeconds: 20

