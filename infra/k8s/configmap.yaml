apiVersion: v1
kind: ConfigMap
metadata:
  name: docops-backend-config
  namespace: docops
data:
  APP_NAME: docops-backend
  APP_ENV: production
  AWS_REGION: us-east-1
  AWS_S3_BUCKET: docops-documents-prod
  AWS_SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/123456789012/docops-processing
  PRESIGNED_URL_TTL_SECONDS: "900"
  MAX_UPLOAD_SIZE_BYTES: "10485760"
  ALLOWED_CONTENT_TYPES: '["application/pdf","text/plain","text/markdown","text/csv","application/json"]'
  AUTH_TRUST_HEADERS: "true"
  CORS_ALLOWED_ORIGINS: '["https://app.example.com"]'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docops-worker-config
  namespace: docops
data:
  APP_NAME: docops-worker
  APP_ENV: production
  AWS_REGION: us-east-1
  AWS_S3_BUCKET: docops-documents-prod
  AWS_SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/123456789012/docops-processing
  WORKER_POLL_WAIT_SECONDS: "20"
  WORKER_POLL_BATCH_SIZE: "5"
  WORKER_VISIBILITY_TIMEOUT: "60"
  WORKER_HEALTH_PORT: "8081"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docops-frontend-config
  namespace: docops
data:
  API_BASE_URL: https://api.example.com

