apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: docops
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: docops
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80

