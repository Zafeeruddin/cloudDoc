services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docops
      POSTGRES_USER: docops
      POSTGRES_PASSWORD: docops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docops -d docops"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/init/minio-init.sh"]
    volumes:
      - ./infra/docker/minio-init.sh:/init/minio-init.sh:ro

  localstack:
    image: localstack/localstack:3.8.1
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"sqs\": \"available\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack-init:
    image: amazon/aws-cli:2.27.51
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init/localstack-init.sh"]
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_ENDPOINT: http://localstack:4566
      DOCOPS_QUEUE_NAME: docops-processing
    volumes:
      - ./infra/docker/localstack-init.sh:/init/localstack-init.sh:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: docops-backend
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://docops:docops@postgres:5432/docops
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: docops-documents-local
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_SQS_QUEUE_URL: http://localstack:4566/000000000000/docops-processing
      AWS_SQS_ENDPOINT_URL: http://localstack:4566
      PRESIGNED_URL_TTL_SECONDS: "900"
      MAX_UPLOAD_SIZE_BYTES: "10485760"
      ALLOWED_CONTENT_TYPES: '["application/pdf","text/plain","text/markdown","text/csv","application/json"]'
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'
      AUTH_TRUST_HEADERS: "true"
      DEV_USER_ID: 00000000-0000-0000-0000-000000000001
      DEV_USER_EMAIL: demo@docops.local
      DEV_USER_NAME: Demo User
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      localstack-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      APP_NAME: docops-worker
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://docops:docops@postgres:5432/docops
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: docops-documents-local
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_SQS_QUEUE_URL: http://localstack:4566/000000000000/docops-processing
      AWS_SQS_ENDPOINT_URL: http://localstack:4566
      WORKER_POLL_WAIT_SECONDS: "20"
      WORKER_POLL_BATCH_SIZE: "5"
      WORKER_VISIBILITY_TIMEOUT: "60"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      localstack-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  postgres-data:
  minio-data:
  localstack-data:
